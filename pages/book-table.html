<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feane Restaurant</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-section py-3">
        <div class="container">
            <a class="navbar-brand logo text-white" href="#">Feane</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="navbarContent">
                <ul class="navbar-nav gap-lg-4 text-center">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">HOME</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active text-white" href="#">MENU</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">ABOUT</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">BOOK TABLE</a>
                    </li>
                </ul>
            </div>

            <div class="d-flex align-items-center gap-3">
                <i class="bi bi-person-fill text-white"></i>
                <i class="bi bi-cart-fill text-white"></i>
                <i class="bi bi-search text-white"></i>

                <button class="btn text-white order-btn">Order Online</button>
            </div>
        </div>
    </nav>
    <section class="second-section">
        <div class="container">
            <h2 class="title-font">Book A Table</h2>
            <div class="row">
                <div class="col-md-6">
                    <form>
                        <input type="text" placeholder="Your Name" class="my-input">
                        <input type="text" placeholder="Phone Number" class="my-input">
                        <input type="email" placeholder="Your Email" class="my-input">
                        <select class="my-input">
                            <option>How many persons?</option>
                            <option>2</option>
                            <option>4</option>
                        </select>
                        <input type="date" class="my-input">
                        <button type="button" class="yellow-btn">BOOK NOW</button>
                    </form>
                </div>
                <div class="col-md-6">
                    <div class="map-box">
                        <iframe src="https://www.google.com/maps/embed" width="100%" height="350"
                            style="border:0; border-radius: 15px;"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
