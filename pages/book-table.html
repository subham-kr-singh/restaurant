<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feane Restaurant</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="first-section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <img src="../image/about-img.png" alt="Burger" class="img-fluid">
                </div>
                <div class="col-md-6 text-white">
                    <h2 class="title-font">We Are Feane</h2>
                    <p>There are many variations of passages of Lorem Ipsum available, but the majority have suffered
                        alteration in some form, by injected humour, or randomised words which don't look even slightly
                        believable.</p>
                    <a href="#" class="yellow-btn">Read More</a>
                </div>
            </div>
        </div>
    </section>

    <section class="second-section">
        <div class="container">
            <h2 class="title-font">Book A Table</h2>
            <div class="row">
                <div class="col-md-6">
                    <form>
                        <input type="text" placeholder="Your Name" class="my-input">
                        <input type="text" placeholder="Phone Number" class="my-input">
                        <input type="email" placeholder="Your Email" class="my-input">
                        <select class="my-input">
                            <option>How many persons?</option>
                            <option>2</option>
                            <option>4</option>
                        </select>
                        <input type="date" class="my-input">
                        <button type="button" class="yellow-btn">BOOK NOW</button>
                    </form>
                </div>
                <div class="col-md-6">
                    <div class="map-box">
                        <iframe src="https://www.google.com/maps/embed" width="100%" height="350"
                            style="border:0; border-radius: 15px;"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
