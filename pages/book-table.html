<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Table</title>

    <!-- custom css -->
    <link rel="stylesheet" href="../styles/style.css">

    <!-- css BootStrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- BootStrap Icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <section>
        <div class="container">
            <div class="heading-container">
                <h2>Book Table</h2>
            </div>

            <div class="container-content d-flex justify-content-center align-content-center">
                <div class="form-container">
                    <form class="custom-form">
                        <!-- 1. Your Name -->
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Your Name">
                        </div>

                        <!-- 2. Phone Number -->
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Phone Number">
                        </div>

                        <!-- 3. Your Email -->
                        <div class="mb-3">
                            <input type="email" class="form-control" placeholder="Your Email">
                        </div>

                        <!-- 4. How many persons? -->
                        <div class="mb-3">
                            <select class="form-select">
                                <option selected disabled>How many persons?</option>
                                <option value="1">1</option>
                                <option value="2">2 </option>
                                <option value="3">3 </option>
                                <option value="4">4 </option>
                                <option value="5">5 </option>
                            </select>
                        </div>

                        <!-- 5. Date -->
                        <div class="mb-4">
                            <input type="date" class="form-control" placeholder="dd-mm-yyyy">
                        </div>
                    </form>
                </div>
                <div class="map">
                    
                </div>
            </div>

            <div class="button-container">
                <button class="text-uppercase rounded-pill h-50 w-25 bg-warning">Book now</button>
            </div>
        </div>
    </section>

    <!-- BootStrap Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
